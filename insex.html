
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alter Boy - Ritual Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
background-color: #030308;
margin: 0;
overflow: hidden;
color: #e0e0f0;
font-family: 'Press Start 2P', cursive;
user-select: none;
touch-action: none;
display: flex;
align-items: center;
justify-content: center;
height: 100vh;
}

#game-container {
position: relative;
width: 100%;
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: radial-gradient(circle, #0a0a1a 0%, #030308 100%);
padding: 10px;
}

canvas {
image-rendering: pixelated;
border: 6px solid #1a1a2e;
box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
background-color: #050510;
width: auto;
max-width: 95vw;
max-height: 55vh; /* Reduced on mobile to make room for joystick below */
flex-shrink: 0;
}

/* Large Screen Adjustments */
@media (min-width: 1024px) {
canvas {
max-height: 85vh; /* Much larger on PC */
max-width: 90vw;
}
}

.overlay {
position: absolute;
inset: 0;
background: rgba(0, 0, 0, 0.9);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 50;
text-align: center;
padding: 20px;
}

.hidden { display: none !important; }

.btn {
background: #d62828;
color: white;
padding: 14px 28px;
border: none;
margin-top: 15px;
cursor: pointer;
box-shadow: 4px 4px 0px #780000;
font-family: 'Press Start 2P', cursive;
font-size: 10px;
transition: transform 0.1s;
}

.btn:active {
transform: translate(2px, 2px);
box-shadow: 2px 2px 0px #780000;
}

#name-input {
background: #111;
border: 2px solid #d62828;
color: white;
padding: 10px;
text-align: center;
font-family: 'Press Start 2P', cursive;
width: 180px;
text-transform: uppercase;
margin-bottom: 10px;
}

#mobile-controls {
position: relative; /* Changed from absolute to flow under the canvas */
margin-top: 20px;
width: 100%;
display: flex;
justify-content: center;
align-items: center;
pointer-events: none;
z-index: 100;
height: 140px; /* Fixed height for the control zone */
}

#joystick-zone {
position: relative;
width: 120px;
height: 120px;
background: rgba(255, 255, 255, 0.05);
border: 4px solid rgba(255, 255, 255, 0.1);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
pointer-events: auto;
touch-action: none;
box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
}

#joystick-knob {
width: 50px;
height: 50px;
background: rgba(214, 40, 40, 0.8);
border-radius: 50%;
box-shadow: 0 0 15px rgba(214, 40, 40, 0.5);
transition: transform 0.05s linear;
}
</style>
</head>
<body>

<div id="game-container">
<div id="ui" class="absolute top-5 w-[90%] flex justify-between pointer-events-none text-[10px] z-10">
<div>SACRIFICED: <span id="score-val">0</span></div>
<div id="health-bar">❤️❤️❤️</div>
</div>

<!-- Start Screen -->
<div id="start-screen" class="overlay">
<h1 class="text-4xl mb-6 text-red-600 drop-shadow-lg">ALTER BOY</h1>
<p class="text-[10px] mb-8 text-blue-400">THE ALTAR DEMANDS FLESH.</p>
<button class="btn" onclick="startGame()">ENTER THE VOID</button>
<div class="mt-8">
<label class="text-[8px] flex items-center gap-2 cursor-pointer">
<input type="checkbox" id="mobile-toggle"> FORCE MOBILE CONTROLS
</label>
</div>
</div>

<!-- Pause Screen -->
<div id="pause-screen" class="overlay hidden">
<h1 class="text-3xl mb-4">HALTED</h1>
<p class="text-xs">Ritual Suspended</p>
<button class="btn" onclick="togglePause()">RESUME</button>
</div>

<!-- Game Over Screen -->
<div id="game-over-screen" class="overlay hidden">
<h1 class="text-3xl mb-2 text-red-700">EXTINGUISHED</h1>
<p id="final-stats" class="text-[10px] mb-6 text-yellow-500"></p>

<div id="score-board" class="text-[10px] mb-4 leading-loose opacity-80 bg-black/40 p-4 rounded-lg"></div>

<div id="entry-area">
<p class="mb-4 text-[8px]">SUBMIT NAME TO THE LEDGER</p>
<input type="text" id="name-input" maxlength="4" placeholder="VOID">
<br>
<button class="btn" onclick="saveScore()">SUBMIT</button>
</div>
<button id="retry-btn" class="btn hidden" onclick="startGame()">RESTART RITUAL</button>
</div>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<div id="mobile-controls" class="hidden">
<div id="joystick-zone">
<div id="joystick-knob"></div>
</div>
</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GAME_WIDTH = 480;
const GAME_HEIGHT = 270;
canvas.width = GAME_WIDTH;
canvas.height = GAME_HEIGHT;

let gameState = 'START';
let score = 0;
let health = 3;
let difficulty = 0;
let monsterTargetCount = 2;
let isHostile = false;
let shake = 0;
let holyFlash = 0;
let particles = [];
let obstacles = [];
let monsters = [];
let projectiles = [];
let deadMonsters = [];
let keys = {};
let joystick = { active: false, x: 0, y: 0, angle: 0, distance: 0 };
let touchControls = { up: false, down: false, left: false, right: false };
let animationId;
let highScores = [];

// Safely try reading from localStorage
try {
highScores = JSON.parse(localStorage.getItem('alterboy_scores') || '[]');
} catch (e) {
highScores = [];
}

const SPEED_MULT = 1.08;

const player = {
x: GAME_WIDTH / 2,
y: GAME_HEIGHT / 2,
w: 18,
h: 18,
baseSpeed: 1.7 * SPEED_MULT,
carrying: null,
history: [],
invuln: 0
};

let altar = { x: 0, y: 0, w: 32, h: 32 };

let audioCtx, masterGain, musicLoop;
let beat = 0;

function initAudio() {
if (audioCtx) return;
try {
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);
masterGain.gain.value = 0.12;
} catch (e) {
console.warn("Web Audio API not supported or blocked by security policy", e);
}
}

function startMusicEngine() {
beat = 0;
if (musicLoop) clearTimeout(musicLoop);

const playLoop = () => {
if (gameState === 'GAMEOVER' || gameState === 'START') return;
if (gameState === 'PAUSED') {
musicLoop = setTimeout(playLoop, 500);
return;
}
if (!audioCtx || audioCtx.state === 'suspended') {
// If audio isn't active, keep checking but don't play sound nodes
musicLoop = setTimeout(playLoop, 350);
return;
}

try {
const now = audioCtx.currentTime;
const tempo = isHostile ? 0.18 : 0.35;

// Bass
const bass = audioCtx.createOscillator();
const bGain = audioCtx.createGain();
bass.type = 'square';
const bassFreq = isHostile ? (beat % 4 === 0 ? 65.41 : 49.00) : (beat % 8 < 4 ? 41.20 : 36.71);
bass.frequency.setValueAtTime(bassFreq, now);
bGain.gain.setValueAtTime(0.08, now);
bGain.gain.exponentialRampToValueAtTime(0.001, now + tempo);
bass.connect(bGain); bGain.connect(masterGain);
bass.start(); bass.stop(now + tempo);

// Melody
const mel = audioCtx.createOscillator();
const mGain = audioCtx.createGain();
mel.type = isHostile ? 'sawtooth' : 'triangle';
const melNotes = isHostile ? [261, 311, 261, 349] : [164, 196, 220, 196];
mel.frequency.setValueAtTime(melNotes[beat % 4], now);
mGain.gain.setValueAtTime(isHostile ? 0.04 : 0.05, now);
mGain.gain.exponentialRampToValueAtTime(0.001, now + tempo * 0.8);
mel.connect(mGain); mGain.connect(masterGain);
mel.start(); mel.stop(now + tempo * 0.8);

beat++;
musicLoop = setTimeout(playLoop, tempo * 1000);
} catch (err) {
// Fail silently if audio nodes fail to compile/play
musicLoop = setTimeout(playLoop, 500);
}
};
playLoop();
}

function playSfx(type) {
if (!audioCtx || audioCtx.state === 'suspended') return;
try {
const n = audioCtx.currentTime;
const o = audioCtx.createOscillator();
const g = audioCtx.createGain();
o.connect(g); g.connect(masterGain);

if (type === 'holy') {
o.type = 'triangle';
o.frequency.setValueAtTime(440, n);
o.frequency.exponentialRampToValueAtTime(1760, n + 0.6);
g.gain.setValueAtTime(0.3, n);
g.gain.linearRampToValueAtTime(0, n + 0.6);
o.start(); o.stop(n + 0.6);
} else if (type === 'hit') {
o.type = 'sawtooth';
o.frequency.setValueAtTime(80, n);
o.frequency.exponentialRampToValueAtTime(30, n + 0.3);
g.gain.setValueAtTime(0.5, n);
o.start(); o.stop(n + 0.3);
}
} catch (e) {}
}

function startGame() {
initAudio();
if (audioCtx && audioCtx.state === 'suspended') {
audioCtx.resume().catch(() => {});
}

gameState = 'PLAYING';
score = 0;
health = 3;
difficulty = 0;
monsterTargetCount = 2;
shake = 0;
monsters = [];
projectiles = [];
obstacles = [];
particles = [];
deadMonsters = [];
player.carrying = null;
player.history = [];
player.x = GAME_WIDTH / 2;
player.y = GAME_HEIGHT / 2;

document.getElementById('start-screen').classList.add('hidden');
document.getElementById('game-over-screen').classList.add('hidden');
document.getElementById('pause-screen').classList.add('hidden');
document.getElementById('retry-btn').classList.add('hidden');
document.getElementById('entry-area').classList.remove('hidden');

// Check for mobile
const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || document.getElementById('mobile-toggle').checked;
if (isTouch) document.getElementById('mobile-controls').classList.remove('hidden');

spawnAltar();
for(let i=0; i<monsterTargetCount; i++) spawnMonster();

startMusicEngine();

if (animationId) cancelAnimationFrame(animationId);
animationId = requestAnimationFrame(gameLoop);
}

function togglePause() {
if (gameState === 'PLAYING') {
gameState = 'PAUSED';
document.getElementById('pause-screen').classList.remove('hidden');
} else if (gameState === 'PAUSED') {
gameState = 'PLAYING';
document.getElementById('pause-screen').classList.add('hidden');
}
}

function spawnAltar() {
altar.x = 80 + Math.random() * (GAME_WIDTH - 160);
altar.y = 80 + Math.random() * (GAME_HEIGHT - 160);
}

function spawnMonster() {
const side = Math.floor(Math.random() * 4);
let x, y;
if (side === 0) { x = -20; y = Math.random() * GAME_HEIGHT; }
else if (side === 1) { x = GAME_WIDTH + 20; y = Math.random() * GAME_HEIGHT; }
else if (side === 2) { x = Math.random() * GAME_WIDTH; y = -20; }
else { x = Math.random() * GAME_WIDTH; y = GAME_HEIGHT + 20; }
monsters.push({
x, y, tx: x, ty: y,
timer: 0,
sTimer: 60 + Math.random() * 60,
angry: false,
stuckTimer: 0,
randomDir: 0
});
}

function spawnObstacleCluster() {
const type = Math.random();
const ox = 60 + Math.random() * (GAME_WIDTH - 120);
const oy = 60 + Math.random() * (GAME_HEIGHT - 120);

if (Math.hypot(ox - player.x, oy - player.y) < 60) return spawnObstacleCluster();
if (Math.hypot(ox - altar.x, oy - altar.y) < 60) return spawnObstacleCluster();

if (type < 0.4) {
const isVert = Math.random() > 0.5;
const length = 2 + Math.floor(Math.random() * 3);
for(let i=0; i<length; i++) {
obstacles.push({
x: ox + (isVert ? 0 : i * 16),
y: oy + (isVert ? i * 16 : 0),
w: 16, h: 16, type: 'wall'
});
}
} else if (type < 0.7) {
obstacles.push({ x: ox, y: oy, w: 16, h: 16, type: 'rock' });
} else {
obstacles.push({ x: ox, y: oy, w: 16, h: 16, type: 'bush' });
}
}

window.addEventListener('keydown', e => {
keys[e.code] = true;
if (e.code === 'Escape' && (gameState === 'PLAYING' || gameState === 'PAUSED')) {
togglePause();
}
});
window.addEventListener('keyup', e => keys[e.code] = false);

const joyZone = document.getElementById('joystick-zone');
const joyKnob = document.getElementById('joystick-knob');

function handleJoystick(e) {
if (!joystick.active) return;
e.preventDefault();
const touch = e.touches[0];
const rect = joyZone.getBoundingClientRect();
const centerX = rect.left + rect.width / 2;
const centerY = rect.top + rect.height / 2;

let dx = touch.clientX - centerX;
let dy = touch.clientY - centerY;
const dist = Math.sqrt(dx*dx + dy*dy);
const maxDist = rect.width / 2;

if (dist > maxDist) {
dx = (dx / dist) * maxDist;
dy = (dy / dist) * maxDist;
}

joystick.x = dx / maxDist;
joystick.y = dy / maxDist;

joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
}

joyZone.addEventListener('touchstart', (e) => {
joystick.active = true;
handleJoystick(e);
});

joyZone.addEventListener('touchmove', handleJoystick);

joyZone.addEventListener('touchend', () => {
joystick.active = false;
joystick.x = 0;
joystick.y = 0;
joyKnob.style.transform = `translate(0, 0)`;
});

function checkCollision(x, y, w, h) {
for (let ob of obstacles) {
if (x < ob.x + ob.w && x + w > ob.x && y < ob.y + ob.h && y + h > ob.y) return true;
}
return false;
}

function update() {
if (gameState !== 'PLAYING') return;

if (player.invuln > 0) player.invuln--;
if (shake > 0) shake *= 0.85;

if (holyFlash > 0) holyFlash -= 0.012;

const speed = player.carrying ? player.baseSpeed * 0.7 : player.baseSpeed;
let dx = 0, dy = 0;

if (keys['ArrowLeft'] || keys['KeyA']) dx -= speed;
if (keys['ArrowRight'] || keys['KeyD']) dx += speed;
if (keys['ArrowUp'] || keys['KeyW']) dy -= speed;
if (keys['ArrowDown'] || keys['KeyS']) dy += speed;

if (joystick.active) {
dx = joystick.x * speed;
dy = joystick.y * speed;
}

if (!checkCollision(player.x + dx, player.y, player.w, player.h)) player.x += dx;
if (!checkCollision(player.x, player.y + dy, player.w, player.h)) player.y += dy;

player.x = Math.max(0, Math.min(GAME_WIDTH - player.w, player.x));
player.y = Math.max(0, Math.min(GAME_HEIGHT - player.h, player.y));

player.history.unshift({ x: player.x, y: player.y });
if (player.history.length > 25) player.history.pop();

isHostile = !!player.carrying;

monsters.forEach(m => {
if (m === player.carrying) {
const lag = player.history[player.history.length - 1];
m.x = lag.x + (player.w/2 - 7);
m.y = lag.y + (player.h/2 - 7);
if (Math.hypot(m.x + 7 - (altar.x + 16), m.y + 7 - (altar.y + 16)) < 25) performSacrifice(m);
} else {
monsters.forEach(other => {
if (m === other || other === player.carrying) return;
const dist = Math.hypot(m.x - other.x, m.y - other.y);
const minDist = 22;
if (dist < minDist) {
const pushAng = Math.atan2(m.y - other.y, m.x - other.x);
const pushX = Math.cos(pushAng) * 0.8;
const pushY = Math.sin(pushAng) * 0.8;

if (!checkCollision(m.x + pushX, m.y, 14, 14)) m.x += pushX;
if (!checkCollision(m.x, m.y + pushY, 14, 14)) m.y += pushY;
}
});

const dist = Math.hypot(m.x + 7 - (player.x + player.w/2), m.y + 7 - (player.y + player.h/2));
let mvSpeed = (isHostile ? 0.6 + difficulty * 0.1 : 0.5) * SPEED_MULT;
let ang;

if (m.stuckTimer > 0) {
ang = m.randomDir;
m.stuckTimer--;

const nx = m.x + Math.cos(ang) * mvSpeed;
const ny = m.y + Math.sin(ang) * mvSpeed;

if (!checkCollision(nx, ny, 14, 14)) {
m.x = nx; m.y = ny;
} else {
m.randomDir = Math.random() * Math.PI * 2;
m.stuckTimer = 20;
}
} else {
if (isHostile) {
m.angry = true;
ang = Math.atan2(player.y + player.h/2 - (m.y + 7), player.x + player.w/2 - (m.x + 7));
} else {
m.angry = false;
m.timer--;
if (m.timer <= 0) {
m.tx = Math.random() * GAME_WIDTH;
m.ty = Math.random() * GAME_HEIGHT;
m.timer = 120 + Math.random() * 120;
}
ang = Math.atan2(m.ty - m.y, m.tx - m.x);
}

let nx = m.x + Math.cos(ang) * mvSpeed;
let ny = m.y + Math.sin(ang) * mvSpeed;

const distToAltar = Math.hypot(m.x + 7 - (altar.x + 16), m.y + 7 - (altar.y + 16));
const avoidRange = 75;
if (distToAltar < avoidRange) {
const avoidAng = Math.atan2(m.y + 7 - (altar.y + 16), m.x + 7 - (altar.x + 16));
const avoidForce = (avoidRange - distToAltar) / avoidRange;
nx += Math.cos(avoidAng) * mvSpeed * avoidForce * 3;
ny += Math.sin(avoidAng) * mvSpeed * avoidForce * 3;
}

if (!checkCollision(nx, ny, 14, 14)) {
m.x = nx; m.y = ny;
} else {
m.stuckTimer = 30;
m.randomDir = Math.random() * Math.PI * 2;
}
}

if (isHostile && m !== player.carrying) {
if (dist < 18 && player.invuln <= 0) takeDamage(1);

m.sTimer--;
if (m.sTimer <= 0) {
const fireAng = Math.atan2(player.y + player.h/2 - (m.y + 7), player.x + player.w/2 - (m.x + 7));
projectiles.push({
x: m.x + 7, y: m.y + 7,
vx: Math.cos(fireAng) * (2.2 + difficulty * 0.2) * SPEED_MULT,
vy: Math.sin(fireAng) * (2.2 + difficulty * 0.2) * SPEED_MULT
});
m.sTimer = Math.max(45, 110 - (difficulty * 8));
}
} else if (!isHostile && dist < 18 && !player.carrying) {
player.carrying = m;
}
}
});

deadMonsters.forEach((dm, i) => {
dm.scale -= 0.05;
dm.rot += 0.2;
dm.y -= 0.5;
if (dm.scale <= 0) deadMonsters.splice(i, 1);
});

projectiles.forEach((p, i) => {
p.x += p.vx; p.y += p.vy;
if (p.x > player.x && p.x < player.x + player.w && p.y > player.y && p.y < player.y + player.h) {
takeDamage(difficulty >= 4 ? 1 : 0.5);
projectiles.splice(i, 1);
} else if (checkCollision(p.x, p.y, 4, 4)) {
projectiles.splice(i, 1);
} else if (p.x < -10 || p.x > GAME_WIDTH + 10 || p.y < -10 || p.y > GAME_HEIGHT + 10) {
projectiles.splice(i, 1);
}
});

particles.forEach((p, i) => {
p.y -= p.vy; p.life -= 0.02;
if (p.life <= 0) particles.splice(i, 1);
});

updateUI();
}

function takeDamage(amt) {
if (player.invuln > 0) return;
health -= amt;
shake = 15;
player.invuln = 70;
playSfx('hit');
if (health <= 0) endGame();
}

function performSacrifice(m) {
playSfx('holy');
score++;
holyFlash = 1.0;
player.carrying = null;
deadMonsters.push({ x: m.x, y: m.y, scale: 1.0, rot: 0 });
monsters = monsters.filter(item => item !== m);

for(let i=0; i<15; i++) {
particles.push({
x: altar.x + 8 + Math.random()*16,
y: altar.y + 8 + Math.random()*16,
vy: Math.random() * 0.8 + 0.3,
life: 1.0
});
}

spawnAltar();

if (score % 5 === 0) {
difficulty++;
monsterTargetCount++;
spawnObstacleCluster();
if (difficulty > 3) spawnObstacleCluster();
}

while (monsters.length < monsterTargetCount) {
spawnMonster();
}
}

function updateUI() {
document.getElementById('score-val').innerText = score;
let h = '';
for(let i=0; i<3; i++) {
if (health > i + 0.5) h += '❤️';
else if (health > i) h += '❣️';
else h += '🖤';
}
document.getElementById('health-bar').innerText = h;
}

function draw() {
ctx.save();
if (shake > 0) {
ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
}

ctx.fillStyle = '#050510';
ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

const pulse = Math.sin(Date.now() / 100) * 12;
const grad = ctx.createRadialGradient(altar.x+16, altar.y+16, 2, altar.x+16, altar.y+16, 45+pulse);
grad.addColorStop(0, 'rgba(255, 180, 50, 0.6)');
grad.addColorStop(0.4, 'rgba(255, 69, 0, 0.3)');
grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
ctx.fillStyle = grad;
ctx.fillRect(altar.x - 30, altar.y - 30, altar.w + 60, altar.h + 60);

// Draw Altar
ctx.fillStyle = '#ff4500';
ctx.fillRect(altar.x, altar.y, altar.w, altar.h);
ctx.fillStyle = '#ff8c00';
ctx.fillRect(altar.x + 4, altar.y + 4, altar.w - 8, altar.h - 8);
ctx.fillStyle = '#ffd700';
const flickerX = Math.random() * 2 - 1;
const flickerY = Math.random() * 2 - 1;
ctx.fillRect(altar.x + 10 + flickerX, altar.y + 10 + flickerY, altar.w - 20, altar.h - 20);

// Obstacles
obstacles.forEach(ob => {
if (ob.type === 'wall') ctx.fillStyle = '#5c5c7d';
else if (ob.type === 'rock') ctx.fillStyle = '#4a4a5a';
else ctx.fillStyle = '#1a3d25';
ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
ctx.fillStyle = 'rgba(0,0,0,0.2)';
ctx.fillRect(ob.x, ob.y + ob.h - 4, ob.w, 4);
});

// Shadows
ctx.fillStyle = 'rgba(0,0,0,0.4)';
monsters.forEach(m => ctx.fillRect(m.x+2, m.y+12, 12, 4));
if (player.invuln % 10 < 5) ctx.fillRect(player.x+2, player.y+16, 14, 4);

deadMonsters.forEach(dm => {
ctx.save();
ctx.translate(dm.x + 7, dm.y + 7);
ctx.scale(dm.scale, dm.scale);
ctx.rotate(dm.rot);
ctx.fillStyle = '#111';
ctx.fillRect(-7, -7, 14, 14);
ctx.restore();
});

particles.forEach(p => {
ctx.fillStyle = `rgba(120, 120, 130, ${p.life})`;
ctx.fillRect(p.x, p.y, 6, 6);
});

// Draw Monsters
monsters.forEach(m => {
ctx.fillStyle = m.angry ? '#ff4444' : '#ffdbac';
ctx.fillRect(m.x, m.y, 14, 14);
ctx.fillStyle = m.angry ? 'white' : 'black';
ctx.fillRect(m.x + 3, m.y + 4, 2, 2);
ctx.fillRect(m.x + 9, m.y + 4, 2, 2);
if (m.angry) {
ctx.strokeStyle = 'white';
ctx.lineWidth = 1;
ctx.beginPath(); ctx.moveTo(m.x+2, m.y+2); ctx.lineTo(m.x+5, m.y+4); ctx.stroke();
ctx.beginPath(); ctx.moveTo(m.x+12, m.y+2); ctx.lineTo(m.x+9, m.y+4); ctx.stroke();
}
});

ctx.fillStyle = '#888';
projectiles.forEach(p => ctx.fillRect(p.x - 3, p.y - 3, 6, 6));

// Draw Player
if (player.invuln % 10 < 5) {
ctx.fillStyle = '#9b59b6';
ctx.fillRect(player.x, player.y, player.w, player.h);
ctx.fillStyle = '#000';
ctx.fillRect(player.x + 4, player.y + 5, 3, 3);
ctx.fillRect(player.x + 11, player.y + 5, 3, 3);
ctx.fillStyle = '#ecf0f1';
ctx.fillRect(player.x, player.y, player.w, 3);
}

if (player.carrying) {
ctx.strokeStyle = 'rgba(255,255,255,0.4)';
ctx.setLineDash([2, 2]);
ctx.beginPath(); ctx.moveTo(player.x + player.w/2, player.y + player.h/2);
ctx.lineTo(player.carrying.x + 7, player.carrying.y + 7);
ctx.stroke(); ctx.setLineDash([]);
}

if (holyFlash > 0) {
ctx.fillStyle = `rgba(255, 255, 255, ${holyFlash})`;
ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
}
ctx.restore();
}

function endGame() {
gameState = 'GAMEOVER';
document.getElementById('game-over-screen').classList.remove('hidden');
document.getElementById('final-stats').innerText = `YOU SACRIFICED ${score} SOULS`;
renderScoreBoard();
}

function renderScoreBoard() {
const board = document.getElementById('score-board');
const sorted = highScores.sort((a, b) => b.score - a.score).slice(0, 5);
board.innerHTML = "ELDER LEDGER:<br>" + sorted.map(s => `${s.name} - ${s.score}`).join('<br>');
}

function saveScore() {
const val = document.getElementById('name-input').value.toUpperCase() || 'VOID';
highScores.push({ name: val.substring(0, 4), score });
try {
localStorage.setItem('alterboy_scores', JSON.stringify(highScores));
} catch (e) {}
document.getElementById('entry-area').classList.add('hidden');
document.getElementById('retry-btn').classList.remove('hidden');
renderScoreBoard();
}

function gameLoop() {
update();
draw();
if (gameState !== 'START') {
animationId = requestAnimationFrame(gameLoop);
}
}
</script>
</body>
</html>
